name: Auto Update & Deploy

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时运行一次
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Setup credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json
        
      - name: Setup .env
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: |
          cat > .env << EOF
          DATA_SOURCE=google
          GOOGLE_SHEET_ID=$GOOGLE_SHEET_ID
          SHEET_NAME=$SHEET_NAME
          TG_BOT_TOKEN=$TG_BOT_TOKEN
          TG_CHANNEL_ID=$TG_CHANNEL_ID
          EOF
          
      - name: Run script
        run: python excel_to_posts.py
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/ public/index.json data_cache.json
          git diff --staged --quiet || git commit -m "🤖 Auto update: $(date '+%Y-%m-%d %H:%M')"
          git push